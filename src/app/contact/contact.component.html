<section class="contact-section section-container">
  <div class="contact-grid">
    <div class="contact-copy reveal">
      <p class="section-kicker">Contact</p>
      <h2>Let us build something sharp, useful, and production-ready.</h2>
      <p>
        Open to full-stack development work, product-minded frontend builds, backend API delivery, and dashboard-heavy applications.
      </p>

      <div class="contact-options">
        <a
          class="contact-item"
          *ngFor="let item of contactItems"
          [href]="item.href"
          [attr.target]="item.label === 'Email' ? null : '_blank'"
          rel="noopener"
        >
          <span>{{ item.label }}</span>
          <strong>{{ item.value }}</strong>
        </a>
      </div>
    </div>

    <form class="contact-form reveal delay-1 animated-border" (ngSubmit)="onSubmit(contactForm)" #contactForm="ngForm">
      <div class="form-header">
        <span>New message</span>
        <h3>Start a conversation</h3>
      </div>

      <label for="name">Name</label>
      <input
        type="text"
        id="name"
        name="name"
        [(ngModel)]="name"
        placeholder="Your name"
        required
      />

      <label for="message">Message</label>
      <textarea
        id="message"
        name="message"
        [(ngModel)]="message"
        rows="6"
        placeholder="Tell me what you want to build"
        required
      ></textarea>

      <button type="submit" [disabled]="!contactForm.valid">Send Email</button>
    </form>
  </div>
</section>
