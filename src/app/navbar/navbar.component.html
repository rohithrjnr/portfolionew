<header class="navbar" [class.menu-open]="isMenuOpen">
  <button class="brand" type="button" (click)="scrollToSection('home')" aria-label="Go to home">
    <span class="brand-mark">RR</span>
    <span class="brand-copy">
      <span>Rohith Raj</span>
      <small>Full Stack Developer</small>
    </span>
  </button>

  <nav class="nav-links" [class.open]="isMenuOpen" aria-label="Primary navigation">
    <button
      *ngFor="let item of navItems"
      type="button"
      class="nav-link"
      [class.active]="activeSection === item.id"
      [attr.aria-current]="activeSection === item.id ? 'page' : null"
      (click)="scrollToSection(item.id)"
    >
      {{ item.label }}
    </button>
  </nav>

  <button
    class="menu-toggle"
    type="button"
    [attr.aria-expanded]="isMenuOpen"
    aria-label="Toggle navigation menu"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>
