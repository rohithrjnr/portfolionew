<section class="skills-section section-container">
  <div class="section-header reveal">
    <p class="section-kicker">Capabilities</p>
    <h2>A stack tuned for product dashboards, APIs, and data-heavy workflows.</h2>
    <p>
      The core toolset spans modern frontend delivery, backend services, relational data, and practical deployment workflows.
    </p>
  </div>

  <div class="skills-grid">
    <article class="skill-category reveal" *ngFor="let category of categories">
      <div class="category-heading">
        <h3>{{ category.title }}</h3>
        <p>{{ category.description }}</p>
      </div>

      <div class="skill-list">
        <div class="skill-row" *ngFor="let skill of category.skills">
          <div class="skill-meta">
            <img [src]="skill.icon" [alt]="skill.name" loading="lazy" />
            <span>{{ skill.name }}</span>
            <strong>{{ skill.level }}%</strong>
          </div>
          <div class="skill-meter" aria-hidden="true">
            <span [style.width.%]="skill.level"></span>
          </div>
        </div>
      </div>
    </article>
  </div>
</section>
