<div class="site-background" aria-hidden="true"></div>
<div class="scroll-progress" aria-hidden="true">
  <span [style.transform]="'scaleX(' + scrollProgress + ')'"></span>
</div>

<app-navbar
  [activeSection]="currentSection"
  [scrolled]="hasScrolled"
  (navigateToSection)="scrollToSection($event)"
></app-navbar>

<main id="sections" class="site-shell">
  <section #homeSection id="home" class="section home-section" aria-label="Hero">
    <app-first-page></app-first-page>
  </section>

  <section #aboutSection id="about" class="section about-section" aria-label="About Rohith Raj">
    <app-about-me></app-about-me>
  </section>

  <section #skillSection id="skills" class="section skill-section" aria-label="Skills">
    <app-skills-section></app-skills-section>
  </section>

  <section #experienceSection id="experience" class="section experience-section" aria-label="Experience">
    <app-experience-section></app-experience-section>
  </section>

  <section #projectsSection id="projects" class="section projects-section" aria-label="Projects">
    <app-projects-section></app-projects-section>
  </section>

  <section #contactSection id="contact" class="section contact-section" aria-label="Contact">
    <app-contact></app-contact>
  </section>
</main>

<app-footer></app-footer>
